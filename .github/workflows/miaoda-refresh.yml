name: Refresh Miaoda World Cup Data

on:
  schedule:
    # Beijing time 11:05 and 18:05.
    - cron: "5 3 * * *"
    - cron: "5 10 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call Miaoda refresh endpoint
        env:
          MIAODA_REFRESH_TOKEN: ${{ secrets.MIAODA_REFRESH_TOKEN }}
        run: |
          test -n "$MIAODA_REFRESH_TOKEN"
          curl --fail --silent --show-error \
            "https://t0nif2phaxz.aiforce.cloud/app/app_179er0n0zcj/__refresh?token=${MIAODA_REFRESH_TOKEN}"
